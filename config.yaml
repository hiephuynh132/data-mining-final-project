# ── ALGORITHMS ───────────────────────────────────────────────
algorithms:
  - kmeans
  - diskmeans
  - fdkm
  - ifdkm
  - ifdfd

# ── SETTINGS ─────────────────────────────────────────────────
settings:
  n_runs: 5                   # 5 runs (nhanh hơn 10, đủ để thấy trend)
  n_init_per_run: 2           # 2 random restarts mỗi run

  gamma_grid: [-8, -6, -4, -2, 0, 2, 4, 6, 8]
  gamma_search_runs: 2        # 2 trial per gamma (nhanh hơn 3)
  gamma_select_by: acc

  max_iter: 300
  tol: 1.0e-6

  seed_base: 42

  output_dir: "results"
  log_dir:    "logs"
